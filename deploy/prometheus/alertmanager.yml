# MiBee Steward Alertmanager Configuration
# Basic template — customize receivers and routing as needed.
route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

receivers:
  - name: "default"
    # Email receiver placeholder
    # email_configs:
    #   - to: "admin@example.com"
    #     from: "alertmanager@example.com"
    #     smarthost: "smtp.example.com:587"
    #     auth_username: "alertmanager@example.com"
    #     auth_password: "<password>"

    # Webhook receiver placeholder
    # webhook_configs:
    #   - url: "http://example.com/webhook/alert"
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
