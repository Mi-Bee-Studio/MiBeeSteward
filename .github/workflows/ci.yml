name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Build the frontend once, then share the produced web/dist/ as an artifact.
  # Both the `go` job (which embeds web/dist via go:embed) and the frontend
  # test job consume it, so neither has to rebuild independently.
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: |
          npm ci
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

  go:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # web/dist/ is gitignored (a build artifact) but go:embed all:dist
      # requires it at compile time — restore the frontend build here.
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v7
        with:
          # golangci-lint v2 requires golangci-lint-action v7+.
          # Pin to an explicit version — the action rejects ranges like 'v2.x'.
          version: v2.12.2
      - run: go test -race -coverprofile=cover.out -covermode=atomic ./...
      - uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: cover.out

  frontend-test:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: |
          npm ci
          npm test

  sqlc-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install sqlc
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.27.0
          sqlc version
      # `sqlc compile` validates queries against the schema locally without
      # requiring a sqlc Cloud project (which `sqlc verify` does).
      - run: sqlc compile
