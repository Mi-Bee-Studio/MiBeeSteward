name: Release

# Builds amd64 + arm64 binaries for both the center (cmd/server, embeds the
# frontend) and the discovery agent (cmd/agent, no SPA), publishes a GitHub
# Release with all four binaries attached, AND publishes a multi-arch container
# image to GHCR (ghcr.io/<owner>/<repo>). CGO-free; SQLite via modernc.org/sqlite.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required by softprops/action-gh-release to create the release
  packages: write  # required to push the container image to GHCR

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: |
          npm ci
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

  release:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # web/dist/ is gitignored but go:embed all:dist requires it at build time.
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        # Inject the git tag (e.g. v0.1.0) as the version string.
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build -ldflags "-s -w -X mibee-steward/internal/version.Version=${VERSION}" \
            -o mibee-steward-${GOOS}-${GOARCH} ./cmd/server/
      - name: Verify version (amd64 only)
        if: matrix.goarch == 'amd64'
        run: ./mibee-steward-${{ matrix.goos }}-${{ matrix.goarch }} -version
      - name: Verify binary (arm64 — file check, can't execute on amd64 runner)
        if: matrix.goarch == 'arm64'
        run: file mibee-steward-${{ matrix.goos }}-${{ matrix.goarch }}
      # Discovery agent (cmd/agent): no SPA, no frontend artifact needed. Same
      # version ldflags so `mibee-agent -version` reports the release tag.
      - name: Build agent binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build -ldflags "-s -w -X mibee-steward/internal/version.Version=${VERSION}" \
            -o mibee-agent-${GOOS}-${GOARCH} ./cmd/agent/
      - name: Verify agent version (amd64 only)
        if: matrix.goarch == 'amd64'
        run: ./mibee-agent-${{ matrix.goos }}-${{ matrix.goarch }} -version
      - name: Verify agent binary (arm64 — file check, can't execute on amd64 runner)
        if: matrix.goarch == 'arm64'
        run: file mibee-agent-${{ matrix.goos }}-${{ matrix.goarch }}
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            mibee-steward-${{ matrix.goos }}-${{ matrix.goarch }}
            mibee-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  # Multi-arch container image → GHCR. The Dockerfile rebuilds the frontend
  # itself (Stage 1), so this job does NOT depend on build-frontend — it runs
  # fully self-contained. Only the unprivileged variant is published
  # (LLDP/CDP/eBPF stay as stubs); users who need those probes build locally
  # with `make docker-build-priv` (see docs/zh/deployment.md).
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      # GHCR image names must be lowercase; github.repository is "Owner/Repo"
      # (mixed case here) — compute a lowercase full image name once.
      - name: Resolve lowercase image name
        id: repo
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.image }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TAGS=

  publish:
    # Needs both the binaries AND the image, so a Release is only created when
    # all artifacts (binaries + container image) have succeeded.
    needs: [release, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            mibee-steward-linux-amd64
            mibee-steward-linux-arm64
            mibee-agent-linux-amd64
            mibee-agent-linux-arm64
