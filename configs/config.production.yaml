# MiBee Steward 生产环境配置模板
# 请根据实际环境修改以下配置

server:
  port: 8080
  host: "0.0.0.0"  # 监听所有接口，配合反向代理使用
  # HTTP 服务器超时。write_timeout 必须大于最慢的同步端点（主要是大 CIDR 的 POST /scanner/scan）。
  # 服务器会在配置值过低时自动将 write_timeout 提升到 scanner.default_timeout×2+30s。
  read_timeout: "15s"
  write_timeout: "5m"
  idle_timeout: "120s"

# 数据库配置
database:
  sqlite:
    path: "./data/mibee.db"  # SQLite 数据库文件路径

# 认证配置
auth:
  jwt_secret: "CHANGE_THIS — generate with: openssl rand -base64 32"  # JWT 签名密钥，生产环境必须更改
  token_expiry: "1h"  # JWT 令牌过期时间
  initial_admin_password: "CHANGE_THIS — first-run admin password"  # 首次运行的管理员密码，生产环境必须更改
  cookie_domain: ""  # 认证 Cookie 的域名（空表示当前域名）
  cookie_secure: true  # 在生产环境中设为 true（需要 HTTPS）
  cookie_same_site: "strict"  # Cookie 安全策略："strict" 或 "lax"

# CORS 配置（由于 SPA 是嵌入式嵌入的，只允许同源请求）
cors:
  allowed_origins: []  # 空数组表示只允许同源请求，因为 SPA 是嵌入式的

# 心跳监控配置
heartbeat:
  default_interval: 30  # 默认心跳检查间隔（秒）
  timeout: 5  # 心跳检查超时时间（秒）
  retention_days: 30  # 心跳数据保留天数

# Prometheus 监控配置
prometheus:
  enabled: true  # 启用 Prometheus 指标收集
  metrics_path: "/metrics"  # 指标端点路径

# 仪表板配置
dashboard:
  data_source_type: "prometheus"  # 数据源类型
  prometheus_url: "http://localhost:9090"  # Prometheus 服务器 URL

# 存储配置
storage:
  upload_path: "./data/uploads"  # 文件上传目录
  max_file_size: 104857600  # 最大文件上传大小（100MB）

# 日志配置
# level: debug, info, warn, error (默认: info)
# format: json, text (默认: text)
log:
  level: "info"  # 日志级别
  format: "json"  # 日志格式（JSON 格式便于日志收集）

# 速率限制配置
rate_limit:
  login_per_minute: 10  # 每分钟最大登录尝试次数
  global_per_minute: 600  # 每个 IP 对所有 API 的速率上限。后台轮询(dashboard/设备页各约 5 次/分钟)+ 多标签 + 正常点击需要余量;/_app/* 静态资源已豁免。NAT 共享出口 IP 的部署需再调高。
  scan_per_minute: 10  # 每个 IP 对 /scan + /tasks/{id}/trigger 的速率上限

# SMTP 配置（用于邮件通知渠道；留空则邮件通道不可用）
smtp:
  host: ""  # SMTP 服务器地址，如 smtp.gmail.com
  port: 587
  username: ""
  password: ""
  from_address: "noreply@example.com"

# 扫描器配置（网络发现）
scanner:
  enabled: true
  max_concurrent_scans: 3
  default_timeout: 300  # 秒，单台主机完整探测流程的超时上限
  per_probe_timeout: 3  # 秒，单次探测尝试（SNMP/TCP/HTTP）超时
  max_concurrent_hosts: 50
  retention_days: 30
  default_cron_expr: "0 */6 * * *"
  engine: "v2"
  persist_raw_evidence: false  # 开启后会写入大量原始探测数据，仅调试时启用
  oui_path: ""  # IEEE OUI 厂商映射文件路径（用 scripts/fetch-oui.sh 获取）
  snmp_community: "public"  # SNMP 团体名，可用 MIBEE_SCANNER_SNMP_COMMUNITY 覆盖
  router_arp:
    routers: []  # 跨子网 MAC 解析的路由器 IP 列表，空则仅本地子网
    community: "public"
    timeout: 4
  pipeline_defaults:
    icmp_enabled: true
    snmp_enabled: true
    port_scan_enabled: true
    default_ports: "22,21,23,25,53,80,110,143,389,443,445,554,631,636,8554,1433,3306,3389,5432,5900,6379,8000,8080,8081,8443,8888,9000,9090,9100,9104,9113,9121,9187,9200,9443,11211,27017,161"
    service_detection_enabled: true
    prometheus_check_enabled: true
    node_exporter_enabled: true
  ebpf:
    enabled: false  # 需 make build-with-ebpf 构建 + 运行时 CAP_BPF/CAP_NET_ADMIN
    interfaces: []
  # Agent lease — agent 网络设备的存活续期。agent 停止上报后，lease sweeper 按超时判定离线。
  agent_lease_ttl: "5m"
  lease_sweep_interval: "60s"
retention:
  heartbeat_results_days: 7
  scan_results_days: 30
  scan_task_runs_days: 30
  audit_logs_days: 90
  notification_log_days: 30
  service_evidence_days: 14
  host_tls_certs_days: 30
  sweep_interval_hours: 6
  batch_size: 5000
