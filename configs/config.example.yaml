server:
  port: 8080
  host: "0.0.0.0"
  # HTTP server timeouts. write_timeout MUST exceed the slowest synchronous
  # endpoint — primarily POST /scanner/scan on large CIDRs. The server
  # auto-raises write_timeout to scanner.default_timeout×2+30s if configured
  # lower, so synchronous scans are never truncated by a too-tight timeout.
  # For very large ranges (>/24) prefer the async task API.
  read_timeout: "15s"
  write_timeout: "5m"
  idle_timeout: "120s"

database:
  sqlite:
    path: "./data/mibee.db"

# Network this instance is responsible for. Resolved to a `networks` table row
# at startup; discovered devices are tagged with its id (devices.network_id) so
# multiple instances on different LANs can coexist without IP collisions.
#   - Single instance: leave at default ("default") — devices get network_id set.
#   - Distributed: each agent sets a distinct name (e.g. "lan-63", "branch-bj").
network:
  name: "default"
  cidr: ""        # e.g. "192.168.63.0/24" — advisory, not enforced
  site: ""        # e.g. "hq" / "datacenter-1"


auth:
  jwt_secret: "change-me-in-production"  # REQUIRED — must change, minimum 32 characters
  token_expiry: "24h"
  initial_admin_password: "change-me"  # REQUIRED — must change for production
  cookie_domain: ""             # Domain for auth cookie (empty = current domain)
  cookie_secure: true          # Set false only for local development without HTTPS
  cookie_same_site: "strict"   # "strict" or "lax"
  cookie_max_age: "24h"           # Cookie MaxAge (defaults to token_expiry if not set)
cors:
  allowed_origins:
    - "https://your-domain.com"  # Replace with your actual domain
    # Remove localhost origins for production

heartbeat:
  default_interval: 30
  timeout: 5
  retention_days: 30

prometheus:
  enabled: true
  metrics_path: "/metrics"

dashboard:
  data_source_type: "prometheus"
  prometheus_url: "http://localhost:9090"

storage:
  upload_path: "./data/uploads"
  max_file_size: 104857600  # 100MB

# Log configuration
# level: debug, info, warn, error (default: info)
# format: json, text (default: text)
log:
  level: "info"
  format: "text"

rate_limit:
  login_per_minute: 10
  global_per_minute: 600  # per-IP cap on all API routes. 600/min leaves headroom for background polling (dashboard/devices ~5/min each) + multi-tab + normal clicking; SPA static assets under /_app/* are exempt. Raise for NAT-shared-IP deployments.
  scan_per_minute: 10           # per-IP cap on /scan + /tasks/{id}/trigger

# SMTP configuration for email notifications
smtp:
  host: ""
  port: 587
  username: ""
  password: ""
  from_address: "noreply@mibee-steward.local"

# Scanner configuration for network discovery
scanner:
  enabled: true
  max_concurrent_scans: 3
  default_timeout: 300        # seconds, per-host pipeline timeout (upper bound for ALL probes + handlers on one host)
  per_probe_timeout: 3        # seconds, single probe attempt (one SNMP Get / TCP dial / HTTP fetch). Keep small so dead hosts fail fast.
  max_concurrent_hosts: 50
  retention_days: 30
  default_cron_expr: "0 */6 * * *"
  # v2 engine tuning (the legacy v1 engine has been removed).
  # engine is retained for compatibility but only "v2" is supported.
  engine: "v2"
  # persist_raw_evidence writes every probe observation to service_evidence.
  # Off by default — raw evidence can be voluminous; enable for debugging.
  persist_raw_evidence: false
  # oui_path points to the IEEE OUI vendor-mapping file. The ARP probe derives
  # a vendor from each discovered MAC via this table. Optional — when empty or
  # missing, MACs are still recorded but no vendor is attached. Override at
  # runtime with MIBEE_SCANNER_OUI_PATH. Fetch the canonical list with
  # scripts/fetch-oui.sh (downloads from standardeee.org).
  oui_path: ""
  # fingerprint_path points to a directory of fingerprint YAML rule files (see
  # configs/fingerprints/ + docs/fingerprint-spec.md). When empty, the engine
  # uses the fingerprint rules embedded in the binary (zero-config). Override at
  # runtime with MIBEE_SCANNER_FINGERPRINT_PATH. Point this at a custom rule
  # directory to extend device/service identification without recompiling.
  fingerprint_path: ""
  # snmp_community overrides the default SNMP community ("public") used by the
  # SNMP probe. Override at runtime with MIBEE_SCANNER_SNMP_COMMUNITY.
  snmp_community: "public"
  # router_arp enables cross-subnet MAC resolution. When populated, the scanner
  # walks these routers' SNMP ARP tables (ipNetToMediaPhysAddress) to find MACs
  # for hosts the scanner can't reach at L2 (e.g. cameras on a different VLAN).
  # Requires the router to run SNMP with the given community. Empty (default)
  # → cross-subnet MAC disabled; the scanner falls back to /proc/net/arp (local
  # subnet only).
  router_arp:
    routers: []        # e.g. ["192.168.63.1", "192.168.62.1"]
    community: "public"
    timeout: 4         # seconds per router walk
  pipeline_defaults:
    icmp_enabled: true
    snmp_enabled: true
    port_scan_enabled: true
    default_ports: "22,21,23,25,53,80,110,143,389,443,445,554,631,636,8554,1433,3306,3389,5432,5900,6379,8000,8080,8081,8443,8888,9000,9090,9100,9104,9113,9121,9187,9200,9443,11211,27017,161"
    service_detection_enabled: true
    prometheus_check_enabled: true
    node_exporter_enabled: true
  # eBPF passive observer (TC ingress). No-op unless the binary was built
  # with `make build-with-ebpf` (WITH_EBPF tag). Requires Linux ≥5.8 + BTF
  # and CAP_BPF/CAP_NET_ADMIN at runtime. Empty interfaces → all non-loopback.
  ebpf:
    enabled: false
    interfaces: []
  # Passive discovery service — spots newly-appeared hosts BETWEEN scheduled
  # scans with near-zero active traffic. It diffs router/local ARP tables and
  # passively listens for mDNS/SSDP (never sends queries), then feeds new hosts
  # through the same device bridge as scans (device_added events + heartbeat
  # seeding). This shrinks the discovery-to-record gap from "next 6h scan" to
  # ~1 minute. Disabled by default; enable when you want quasi-realtime
  # onboarding of new devices.
  discovery:
    enabled: false
    interval: 60          # seconds — poll cadence for the ARP-based sources
    trigger_identify: true # run a single-IP full identification scan on each
                           # new host so it gets a type + services immediately
                           # (recommended; set false to record as "unknown")
    # router_arp: walks scanner.router_arp.routers' SNMP ARP tables. Widest
    # coverage — a gateway knows every host that talks through it. One SNMP Walk
    # per router per interval; no end-host traffic. No-op without routers.
    router_arp:
      enabled: true
    # arp_cache: diffs the local /proc/net/arp kernel cache. Zero network
    # traffic; covers hosts the scanner host has communicated with (including
    # those populated by the scheduled scan's ICMP/TCP probes).
    arp_cache:
      enabled: true
    # multicast: passively listens on mDNS (224.0.0.251:5353) + SSDP
    # (239.255.255.250:1900) for self-advertising devices (cameras/printers/
    # IoT/Mac/UPnP). Zero outbound traffic; supplemental coverage only.
    # Binds with SO_REUSEADDR to coexist with avahi/systemd-resolved; if the
    # port is unavailable the source disables itself without crashing.
    multicast:
      enabled: true
  # ── Agent lease (distributed model) ───────────────────────────────────────
  # Agent-managed devices (networks with agent_id set) are kept online by their
  # agent's reports — the center does NOT probe them locally (cross-subnet ICMP
  # would always fail and flap them offline). The report refreshes a per-device
  # lease; if an agent stops reporting a host, the lease sweeper below expires
  # it (marks offline + emits device_lost). Only agent networks are swept; the
  # center's own network uses the local-scan DetectLost path + heartbeat.
  agent_lease_ttl: "5m"        # how long a snapshot may be stale before expiring
  lease_sweep_interval: "60s"  # how often the expiration sweep runs
# ── Retention (data-volume management) ─────────────────────────────────────
# The retention sweeper runs every sweep_interval_hours and prunes each
# high-volume detail table in batches of batch_size rows (batching avoids
# locking the database on a single giant DELETE). A field of 0 means "use the
# documented default", NOT "keep forever" — these tables are never retained
# indefinitely.
#
# Defaults: heartbeat 7d, scan_results/runs 30d, audit 90d, notifications 30d,
# service_evidence 14d, host_tls_certs 30d, sweep every 6h, batches of 5000.
retention:
  heartbeat_results_days: 7
  scan_results_days: 30
  scan_task_runs_days: 30
  audit_logs_days: 90
  notification_log_days: 30
  service_evidence_days: 14
  host_tls_certs_days: 30
  sweep_interval_hours: 6
  batch_size: 5000
