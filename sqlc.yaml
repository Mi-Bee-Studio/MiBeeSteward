version: "2"
sql:
  - engine: "sqlite"
    queries: "db/queries"
    schema: "db/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "text"
            go_type: "string"
          - db_type: "integer"
            go_type: "int64"
